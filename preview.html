<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slider Orbit Tower</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow-x: hidden; }

.scene {
  height: 500vh;
  background: #000;
  position: relative;
}
.sticky-view {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
}

/* TOWER — top se, z-index 10 */
.tower-wrap {
  position: absolute;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  z-index: 10;       /* tower ka z-index */
  will-change: transform;
}
.tower-wrap img {
  height: 130vh;
  display: block;
}

/* ORBIT */
.orbit-wrap {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.img-card {
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 16px;
  overflow: hidden;
  will-change: transform, opacity;
}
.img-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.scroll-hint {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  font-family: sans-serif;
  letter-spacing: 0.1em;
  z-index: 999;
  pointer-events: none;
  transition: opacity 0.4s;
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="sticky-view">

    <div class="orbit-wrap">
      <div class="img-card" id="c0"><img src="images/1.webp"></div>
      <div class="img-card" id="c1"><img src="images/2.webp"></div>
      <div class="img-card" id="c2"><img src="images/3.webp"></div>
      <div class="img-card" id="c3"><img src="images/4.webp"></div>
      <div class="img-card" id="c4"><img src="images/5.webp"></div>
      <div class="img-card" id="c5"><img src="images/6.webp"></div>
      <div class="img-card" id="c6"><img src="images/work-1.webp"></div>
      <div class="img-card" id="c7"><img src="images/work-2.webp"></div>
    </div>

    <div class="tower-wrap" id="towerWrap">
      <img src="images/eiffel-tower.png">
    </div>

    <div class="scroll-hint" id="scrollHint">scroll down</div>

  </div>
</div>

<script>
const scene = document.getElementById('scene');
const tower = document.getElementById('towerWrap');
const hint  = document.getElementById('scrollHint');
const cards = Array.from({length:8},(_,i)=>document.getElementById('c'+i));

const ROTATIONS = 2;
const RX = 240;
const RY = 70;

function clamp(v,a,b){return Math.min(Math.max(v,a),b)}
function lerp(a,b,t){return a+(b-a)*t}

function update(){
  const progress = clamp(window.scrollY/(scene.offsetHeight-window.innerHeight),0,1);

  tower.style.transform = `translateX(-50%) translateY(${progress * -40}vh)`;
  hint.style.opacity = progress < 0.04 ? 1 : 0;

  cards.forEach((card, i) => {
    const angle = progress * Math.PI * 2 * ROTATIONS + (i * Math.PI * 2 / 8);
    const depth = Math.cos(angle);
    const x = Math.cos(angle) * RX;
    const y = Math.sin(angle) * RY;

    const isHero = depth > 0.78;

    let w, h, z, op, shadow, br;

    if(isHero){
      // FRONT IMAGE — 700px, tower ke AAGE (z:50)
      w = 700; h = 460;
      z = 50;             /* tower z-index 10 se zyada — aage aayegi */
      op = 1;
      shadow = '0 32px 100px rgba(0,0,0,0.95), 0 0 0 2px rgba(255,255,255,0.2)';
      br = '20px';
    } else {
      const t = clamp((depth+1)/2, 0, 1);
      w  = Math.round(lerp(80, 160, t));
      h  = Math.round(lerp(55, 110, t));
      z  = depth > 0 ? 8 : 2;  /* tower ke PEECHE */
      op = lerp(0.18, 0.65, t);
      shadow = '0 4px 20px rgba(0,0,0,0.6)';
      br = '10px';
    }

    card.style.width       = w + 'px';
    card.style.height      = h + 'px';
    card.style.borderRadius = br;
    card.style.transform   = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
    card.style.opacity     = op;
    card.style.zIndex      = z;
    card.style.boxShadow   = shadow;
  });
}

window.addEventListener('scroll', update, {passive:true});
update();
</script>

</body>
</html>
